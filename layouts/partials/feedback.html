<div class="message-form">
  <p>{{ i18n "contactForm" }}</p>

  <div id="message" class="message"></div>

  <form id="feedbackForm">
    <div class="form-group">
      <label for="name">{{ i18n "contactFormName" }}</label>
      <br />
      <input type="text" id="name" name="name" value="fb-messenger:@example" />
    </div>

    <div class="form-group">
      <label for="message">{{ i18n "contactFormMessage" }}</label>
      <br />
      <textarea id="messageText" name="message" required></textarea>
    </div>

    <button type="submit" class="btn" id="submitBtn">Send Feedback</button>
  </form>
</div>

<script>
  // Replace with your Cloudflare Worker URL
  const WORKER_URL = "https://legen-feedback.user27384.workers.dev/";

  const form = document.getElementById("feedbackForm");
  const messageDiv = document.getElementById("message");
  const submitBtn = document.getElementById("submitBtn");

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type} show`;
    setTimeout(() => {
      messageDiv.classList.remove("show");
    }, 5000);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = {
      name: document.getElementById("name").value,
      message: document.getElementById("messageText").value,
    };

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";

    try {
      const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(formData),
      });

      const data = await response.json();

      if (response.ok) {
        showMessage(
          "Thank you! Your feedback has been sent successfully.",
          "success"
        );
        form.reset();
      } else {
        showMessage(
          data.error || "Something went wrong. Please try again.",
          "error"
        );
      }
    } catch (error) {
      showMessage(
        "Failed to send feedback. Please check your connection.",
        "error"
      );
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Send Feedback";
    }
  });
</script>
